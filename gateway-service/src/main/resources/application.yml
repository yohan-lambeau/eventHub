spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          routes:
            - id: event-service-route
              uri: lb://EVENT-SERVICE
              predicates:
                - Path=/events/**

management:
  endpoints:
    web:
      exposure:
        include: "*"

  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true

  endpoint:
    health:
      show-details: always
      probes:
        enabled: true