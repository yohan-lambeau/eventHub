###Config
spring:
  application:
    name: event-service

  config:
    import: "optional:configserver:http://localhost:8071"

#Configuration EUREKA CLIENT
eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8070/eureka